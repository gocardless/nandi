inherit_from: .rubocop_todo.yml

inherit_gem:
  gc_ruboconfig: rubocop.yml

plugins:
  - rubocop-rspec

AllCops:
  DisplayCopNames: true
  NewCops: enable
  TargetRubyVersion: 3.3
  Exclude:
    - .*/**/*
    - bin/**/*
    - lib/**/templates/**/*
    - spec/nandi/fixtures/**/*
    - node_modules/**/*
    - vendor/**/*

Metrics/MethodLength:
  Max: 30

Metrics/AbcSize:
  Max: 20

Gemspec/RequiredRubyVersion:
  Enabled: false

RSpec/MultipleExpectations:
  Max: 5

RSpec/ExampleLength:
  Max: 20

RSpec/NestedGroups:
  Max: 5
